services:
  ##########################################################
  # 🚀 API SERVICE
  ##########################################################
  - type: web
    name: talawa-api
    runtime: docker
    dockerfilePath: ./docker/api.Containerfile
    dockerContext: .
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: ${PORT}
      - key: DATABASE_URL
        fromDatabase:
          name: talawa-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: talawa-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: API_BASE_URL
        value: https://talawa-api.onrender.com
      - key: LOG_LEVEL
        value: info

  ##########################################################
  # 🔑 REDIS SERVICE (KeyValue Free Plan)
  ##########################################################
  - type: keyvalue
    name: talawa-redis
    plan: free
    allowList:
      - type: service
        serviceName: talawa-api

##########################################################
# 🗄️ DATABASE (Postgres Free Plan)
##########################################################
databases:
  - name: talawa-postgres
    plan: free
