# render.yaml
# Talawa API Free-Tier Blueprint for Render
# Includes API, Redis, and Postgres

services:
  ##########################################################
  # 🚀 API SERVICE
  ##########################################################
  - type: web
    name: talawa-api
    runtime: docker
    dockerfilePath: ./docker/api.Containerfile
    dockerContext: .
    plan: free
    autoDeploy: true
    envVars:
      # Basic
      - key: NODE_ENV
        value: production
      - key: PORT
        value: ${PORT}

      ######################################################
      # DATABASE (Postgres)
      ######################################################
      - key: DATABASE_URL
        fromDatabase:
          name: talawa-postgres
          property: connectionString

      ######################################################
      # REDIS
      ######################################################
      - key: REDIS_URL
        fromService:
          name: talawa-redis
          type: keyvalue
          property: connectionString

      ######################################################
      # ADMIN / SECRETS (fill manually in Render)
      ######################################################
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      ######################################################
      # COMMUNITY / API CONFIG
      ######################################################
      - key: API_BASE_URL
        value: https://talawa-api.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: API_COMMUNITY_NAME
        value: Talawa Community
      - key: FRONTEND_URL
        value: https://example-frontend.com

      # Optional GraphQL & rate-limit settings
      - key: API_IS_GRAPHIQL
        value: "false"
      - key: API_IS_PINO_PRETTY
        value: "false"
      - key: API_IS_APPLY_DRIZZLE_MIGRATIONS
        value: "true"
      - key: API_GRAPHQL_SCALAR_FIELD_COST
        value: "1"
      - key: API_GRAPHQL_SCALAR_RESOLVER_FIELD_COST
        value: "2"
      - key: API_GRAPHQL_OBJECT_FIELD_COST
        value: "2"
      - key: API_GRAPHQL_LIST_FIELD_COST
        value: "2"
      - key: API_GRAPHQL_NON_PAGINATED_LIST_FIELD_COST
        value: "2"
      - key: API_GRAPHQL_MUTATION_BASE_COST
        value: "5"
      - key: API_GRAPHQL_SUBSCRIPTION_BASE_COST
        value: "10"
      - key: API_RATE_LIMIT_BUCKET_CAPACITY
        value: "50"
      - key: API_RATE_LIMIT_REFILL_RATE
        value: "5"

  ##########################################################
  # 🔑 REDIS SERVICE (KeyValue)
  ##########################################################
  - type: keyvalue
    name: talawa-redis
    plan: free

##########################################################
# 🗄️ DATABASE (Postgres Free Plan)
##########################################################
databases:
  - name: talawa-postgres
    plan: free
